@if (component(); as component) {
  <div class="examples">
    @for (example of component.examples; track example.id) {
      <article class="example" [attr.data-example]="example.id">
        <header class="example-header">
          <h3>{{ example.title }}</h3>
          <p>{{ example.description }}</p>
        </header>
        <app-example-preview [preview]="example.preview" />
        <h4>Generated source</h4>
        <pre><code>{{ example.code }}</code></pre>
      </article>
    }
  </div>
}
