<mat-toolbar color="primary" class="app-toolbar">
  <a routerLink="/components" class="app-title">OpenUI Spec</a>
  <span class="toolbar-spacer"></span>
  <span class="app-subtitle">Angular generator examples</span>
</mat-toolbar>

<mat-sidenav-container class="app-shell">
  <mat-sidenav mode="side" opened class="app-sidenav">
    <nav aria-label="Generated components">
      @for (category of categories; track category.id) {
        <h2 class="nav-category">{{ category.name }}</h2>
        <mat-nav-list>
          @for (component of category.items; track component.id) {
            <a
              mat-list-item
              [routerLink]="['/components', component.id]"
              routerLinkActive
              #linkActive="routerLinkActive"
              [activated]="linkActive.isActive"
            >
              {{ component.name }}
            </a>
          }
        </mat-nav-list>
      }
    </nav>
  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <main class="content-inner">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
