<mat-card class="upload-card">
  <mat-card-header>
    <mat-card-title>File Upload</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <app-file-select></app-file-select>
  </mat-card-content>
  <mat-card-actions>
    <button
      mat-raised-button
      color="accent"
      (click)="uploadFile()"
      [disabled]="!selectedFile()"
      class="upload-button"
    >
      <mat-icon>cloud_upload</mat-icon>
      Upload
    </button>
  </mat-card-actions>
</mat-card>
