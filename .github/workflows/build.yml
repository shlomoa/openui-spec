name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.x"

      - name: Install Python validation tools
        run: python -m pip install pre-commit==4.6.0 -r requirements-test.txt -r requirements-docs.txt

      - name: Run lint checks
        run: pre-commit run --all-files

      - name: Run whitespace checks
        run: git diff --check

      - name: Run repository checks
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Build documentation
        run: python -m mkdocs build --strict

      - name: Set up Node
        uses: actions/setup-node@v6.1.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            generators/angular/generator/package-lock.json
            generators/angular/generated-examples/package-lock.json

      - name: Install Angular generator dependencies
        working-directory: generators/angular/generator
        run: npm ci

      - name: Build Angular generator
        working-directory: generators/angular/generator
        run: npm run build

      - name: Test Angular generator
        working-directory: generators/angular/generator
        run: npm test

      - name: Install Angular examples app dependencies
        working-directory: generators/angular/generated-examples
        run: npm ci

      - name: Check Angular examples app formatting
        working-directory: generators/angular/generated-examples
        run: npm run format:check

      - name: Lint Angular examples app
        working-directory: generators/angular/generated-examples
        run: npm run lint

      - name: Test Angular examples app
        working-directory: generators/angular/generated-examples
        run: npm test

      - name: Build Angular examples app
        working-directory: generators/angular/generated-examples
        run: npm run build
